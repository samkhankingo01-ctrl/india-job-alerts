name: Update India Jobs

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours (UTC)
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write              # Needed for auto-commit + push

jobs:
  update-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full job update pipeline
        run: python main.py --run-all
        continue-on-error: false

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto: Update jobs – $(date +%Y-%m-%d_%H-%M)"
            git push
          fi

      - name: Log on failure
        if: failure()
        run: echo "Job update failed at $(date)" >> error.log
